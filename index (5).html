<style>
:root{--bg:#0f0808;--sf:#1a0e0e;--sf2:#231313;--bd:#3a1f1f;--tx:#f2e4d0;--mu:#7a5a4a;--gold:#D4A017;--gold2:#b8860b;--red:#8B1A1A;--gn:#22c55e;--danger:#ef4444;--or:#f97316;--bl:#60a5fa;--sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}
#splash{position:fixed;inset:0;background:radial-gradient(ellipse at 50% 30%,#3a0a0a,var(--bg) 70%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .6s,transform .6s}
#splash.hide{opacity:0;transform:scale(1.06);pointer-events:none}
.ring{width:106px;height:106px;border-radius:50%;background:conic-gradient(var(--gold),var(--gold2),var(--red),var(--gold));padding:3px;animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ring-i{width:100%;height:100%;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center}
.spl-bar{width:140px;height:3px;background:var(--sf2);border-radius:99px;margin-top:48px;overflow:hidden}
.spl-fill{height:100%;width:0;background:linear-gradient(90deg,var(--red),var(--gold));border-radius:99px;transition:width 2s ease}
.screen{position:fixed;inset:0;background:var(--bg);display:none;align-items:center;justify-content:center;padding:20px;z-index:500;flex-direction:column;overflow-y:auto}
.screen.show{display:flex}
.lbg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(139,26,26,.2),transparent 60%);pointer-events:none}
.lw{width:100%;max-width:380px;position:relative;z-index:1}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:16px}
.h2{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.lbl{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:6px}
.inp{background:var(--sf2);border:1.5px solid var(--bd);border-radius:9px;padding:11px 14px;color:var(--tx);font-size:15px;width:100%;outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--gold)}
.inp::placeholder{color:var(--mu)}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 20px;border-radius:10px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:14px;transition:all .2s ease;border:none}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.bprim{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.bprim:hover{filter:brightness(1.08)}
.bred{background:var(--red);color:var(--tx)}
.bsec{background:var(--sf2);color:var(--tx);border:1px solid var(--bd)}
.bsec:hover{background:var(--bd)}
.bfull{width:100%}
.blg{padding:15px 24px;font-size:16px;border-radius:12px}
.mono{font-family:'DM Mono',monospace}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(0,0,0,.25);border-top-color:#000;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:6px}
.spinner.light{border-color:rgba(255,255,255,.25);border-top-color:#fff}
@keyframes sp{to{transform:rotate(360deg)}}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:12px 16px;padding-top:calc(12px + var(--st));display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
@media(min-width:768px){.topbar{margin-left:220px}}
.sidebar{display:none;position:fixed;top:0;left:0;bottom:0;width:220px;background:var(--sf);border-right:1px solid var(--bd);flex-direction:column;padding:0 10px 16px;z-index:100;gap:2px}
@media(min-width:768px){.sidebar{display:flex}}
.sb-brand{padding:16px 10px 18px;border-bottom:1px solid var(--bd);margin-bottom:8px}
.sb-bn{font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;color:var(--gold);letter-spacing:.06em}
.si{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;color:var(--mu);font-size:13px;font-weight:600;width:100%;transition:all .15s;text-align:left}
.si:hover{background:var(--sf2);color:var(--tx)}
.si.active{background:rgba(212,160,23,.12);color:var(--gold)}
.sb-foot{padding:10px 4px;border-top:1px solid var(--bd);margin-top:auto}
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:var(--sf);border-top:1px solid var(--bd);display:flex;padding-bottom:var(--sb);z-index:100;height:calc(62px + var(--sb))}
@media(min-width:768px){.bottomnav{display:none}}
.bni{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px;color:var(--mu);font-size:10px;font-weight:700;flex:1;transition:color .15s;min-height:62px}
.bni svg{width:22px;height:22px;fill:currentColor;transition:all .15s}
.bni.active{color:var(--gold)}
.bni.active svg{transform:scale(1.1)}
.content{padding:14px;padding-bottom:calc(80px + var(--sb))}
@media(min-width:768px){.content{margin-left:220px;padding-bottom:20px}}
.view{display:none;animation:fu .22s ease}
.view.active{display:block}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
@media(min-width:500px){.sgrid{grid-template-columns:repeat(4,1fr)}}
.sc{background:var(--sf);border:1px solid var(--bd);border-radius:13px;padding:13px 14px}
.sv{font-family:'Oswald',sans-serif;font-size:34px;font-weight:700;line-height:1}
.slb{font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.mascot-wrap{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--sf),rgba(139,26,26,.15));border:1px solid var(--bd);border-radius:15px;padding:14px 16px;margin-bottom:16px;position:relative;overflow:hidden}
.mascot-wrap::before{content:'';position:absolute;top:-20px;right:-20px;width:100px;height:100px;background:radial-gradient(circle,rgba(212,160,23,.07),transparent 70%)}
.mascot-mood{font-family:'Oswald',sans-serif;font-size:16px;font-weight:700;color:var(--gold);margin-bottom:4px}
.mascot-txt{font-size:12px;color:var(--tx);line-height:1.5}
.pbar-wrap{height:4px;background:var(--bd);border-radius:99px;overflow:hidden;margin-top:5px}
.pbar-fill{height:100%;border-radius:99px;transition:width .4s}
.fav-scroll{display:flex;gap:9px;overflow-x:auto;padding-bottom:4px;margin-bottom:16px;scrollbar-width:none}
.fav-scroll::-webkit-scrollbar{display:none}
.fav-card{flex-shrink:0;width:130px;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:11px;cursor:pointer;transition:border-color .15s}
.fav-card:active{border-color:var(--gold);transform:scale(.97)}
.fav-b{width:30px;height:30px;border-radius:8px;font-size:17px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;border:none}
.fav-b:active{transform:scale(.88)}
.mtgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:18px}
.mtbtn{padding:18px 10px;border-radius:13px;border:2px solid var(--bd);background:var(--sf);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;transition:all .2s ease;width:100%}
.mtbtn:hover,.mtbtn:active{border-color:var(--gold);background:rgba(212,160,23,.07)}
.mtbtn .lb{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:var(--tx)}
.mtbtn .ds{font-size:10px;color:var(--mu)}
.pitem{padding:12px 13px;border-radius:11px;border:1px solid var(--bd);background:var(--sf);margin-bottom:7px;transition:border-color .15s}
.pitem:active{border-color:var(--gold)}
.pitem-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:7px;gap:8px}
.pitem-acts{display:flex;gap:7px;align-items:center;flex-wrap:wrap;margin-top:9px}
.qa-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;border:none}
.qa-btn:active{transform:scale(.93)}
.qa-in{background:rgba(212,160,23,.12);color:var(--gold)}
.qa-out{background:rgba(239,68,68,.1);color:#ef4444}
.qc{display:flex;align-items:center;gap:18px;justify-content:center;padding:8px 0}
.qb{width:54px;height:54px;border-radius:50%;border:2px solid var(--bd);background:var(--sf2);color:var(--tx);font-size:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease}
.qb:hover,.qb:active{border-color:var(--gold);color:var(--gold)}
.qd{font-family:'DM Mono',monospace;font-size:52px;color:var(--gold);min-width:80px;text-align:center;line-height:1}
.sbar{background:var(--sf2);border:1.5px solid var(--bd);border-radius:10px;padding:10px 13px;display:flex;gap:8px;align-items:center;margin-bottom:11px}
.sbar input{background:none;border:none;outline:none;color:var(--tx);font-family:'Nunito',sans-serif;font-size:14px;flex:1}
.sbar input::placeholder{color:var(--mu)}
.chips{display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 11px;font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;border-bottom:1px solid var(--bd);white-space:nowrap}
.tbl td{padding:10px 11px;border-bottom:1px solid rgba(58,31,31,.5);font-size:12px}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--sf2)}
.ovx{overflow-x:auto}
.steps{display:flex;gap:5px;align-items:center;margin-bottom:18px}
.dot{width:7px;height:7px;border-radius:4px;background:var(--bd);transition:all .2s}
.dot.cur{background:var(--gold);width:22px}
.dot.dn{background:var(--gn)}
.locbtn{flex:1;padding:14px;border-radius:11px;border:2px solid var(--bd);background:var(--sf);cursor:pointer;text-align:center;font-weight:700;font-size:13px;color:var(--tx);transition:all .2s ease}
.locbtn.sel{border-color:var(--gold);background:rgba(212,160,23,.08);color:var(--gold)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:none;align-items:flex-end;padding:14px;transition:opacity .25s ease}
.overlay.open{display:flex}
@media(min-width:600px){.overlay{align-items:center;justify-content:center}}
.modal{background:var(--sf);border-radius:18px 18px 13px 13px;width:100%;max-width:480px;padding:22px;border:1px solid var(--bd);max-height:90vh;overflow-y:auto;animation:slideUp .25s ease}
@media(min-width:600px){.modal{border-radius:18px}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
#toast{position:fixed;bottom:82px;left:50%;transform:translateX(-50%) translateY(12px);padding:11px 22px;border-radius:100px;font-weight:700;font-size:13px;z-index:999;display:none;white-space:nowrap;pointer-events:none;color:#fff;opacity:0;transition:all .25s ease}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){#toast{bottom:20px}}
.gdiv{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.25;margin:15px 0}
.errbox{color:var(--danger);font-weight:700;font-size:12px;padding:8px 11px;background:rgba(239,68,68,.1);border-radius:8px;margin-bottom:9px}
.empty{text-align:center;padding:44px 20px;color:var(--mu)}
.credit{text-align:center;padding:20px 0 4px;color:var(--mu);font-size:11px}
.credit span{color:var(--gold);font-weight:700}
.sec-t{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.1em;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.sec-t::after{content:'';flex:1;height:1px;background:var(--bd)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gn);display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-dot.off{background:var(--mu);animation:none}
#loading-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--red),var(--gold));z-index:9999;width:0;transition:width .3s ease,opacity .3s ease;display:none}
</style>

function cst(pid,movs){var e=0,g=0,i,m,q;for(i=0;i<movs.length;i++){m=movs[i];if(m.product_id!==pid)continue;q=Number(m.quantidade)||0;if(m.tipo==='Entrada')e+=q;else if(m.tipo==='Transferencia'){e-=q;g+=q;}else if(m.tipo==='Venda')g-=q;else if(m.tipo==='Avaria'||m.tipo==='Vencido'){if(m.local==='Estoque')e-=q;else g-=q;}}return{est:e,gel:g,total:e+g};}
function gst(tot,mn){if(tot<=0&&mn>0)return{s:'SEM ESTOQUE',c:'#ef4444',b:'rgba(239,68,68,.12)'};if(tot<mn)return{s:'ABAIXO MIN',c:'#D4A017',b:'rgba(212,160,23,.12)'};return{s:'OK',c:'#22c55e',b:'rgba(34,197,94,.12)'};}
function bdg(tot,mn){var s=gst(tot,mn);var ic={'OK':'OK','ABAIXO MIN':'Baixo','SEM ESTOQUE':'Zerado'};return'<span class="chip" style="background:'+s.b+';color:'+s.c+'">'+(ic[s.s]||s.s)+'</span>';}
function pbr(tot,mn){var f=Math.max((mn||0)*2,tot+1,10);var p=Math.min(100,(tot/f)*100);var c=p>50?'#22c55e':p>20?'#D4A017':'#ef4444';return'<div class="pbar-wrap"><div class="pbar-fill" style="width:'+p+'%;background:'+c+'"></div></div>';}
function getMood(ps,ms){var cr=0,wn=0,i,s;for(i=0;i<ps.length;i++){s=cst(ps[i].id,ms);var st=gst(s.total,ps[i].estoque_minimo||0);if(st.s==='SEM ESTOQUE')cr++;else if(st.s==='ABAIXO MIN')wn++;}if(cr>0)return'critical';if(wn>0)return'warn';return'ok';}
function rinfo(p,ms){var s=cst(p.id,ms);var ago=new Date(Date.now()-30*864e5).toISOString().slice(0,10);var v=0,i;for(i=0;i<ms.length;i++){if(ms[i].product_id===p.id&&ms[i].tipo==='Venda'&&ms[i].data>=ago)v+=Number(ms[i].quantidade);}var avg=v/30;if(avg<=0)return null;return{days:Math.floor(s.total/avg),avg:avg.toFixed(1)};}
function fcur(v){return'R$ '+Number(v||0).toFixed(2).replace('.',',');}
function tday(){return new Date().toISOString().slice(0,10);}
function yday(){return new Date(Date.now()-864e5).toISOString().slice(0,10);}
function esc(s){var d=document.createElement('div');d.textContent=String(s||'');return d.innerHTML;}

    var tE=0,tT=0,tV=0,tP=0,tL=0;for(i=0;i<data.length;i++){tE+=data[i].e;tT+=data[i].t;tV+=data[i].v;tP+=data[i].a+data[i].vc;tL+=data[i].lu;}
    var mO='';for(i=0;i<MONTHS.length;i++)mO+='<option value="'+(i+1)+'" '+(i+1===mth?'selected':'')+'>'+MONTHS[i]+'</option>';
    var yO='';var yrs=[2024,2025,2026,2027];for(i=0;i<yrs.length;i++)yO+='<option value="'+yrs[i]+'" '+(yrs[i]===yr?'selected':'')+'>'+yrs[i]+'</option>';
    var rows='';
    if(data.length===0)rows='<tr><td colspan="7" style="text-align:center;padding:28px;color:var(--mu)">Sem movimentacoes em '+MONTHS[mth-1]+' '+yr+'.</td></tr>';
    else{for(i=0;i<data.length;i++){var d=data[i];rows+='<tr><td><div style="font-weight:700;font-size:12px">'+esc(d.p.item)+'</div></td><td class="mono" style="color:#22c55e">'+(d.e||'-')+'</td><td class="mono" style="color:#60a5fa">'+(d.t||'-')+'</td><td class="mono" style="color:var(--gold)">'+(d.v||'-')+'</td><td class="mono" style="color:#f97316">'+(d.a||'-')+'</td><td class="mono" style="color:#ef4444">'+(d.vc||'-')+'</td><td class="mono" style="color:'+(d.lu>0?'#22c55e':'var(--mu)')+';">'+(d.lu>0?fcur(d.lu):'-')+'</td></tr>';}rows+='<tr style="background:var(--sf2)"><td style="font-family:Oswald,sans-serif;font-weight:700;font-size:12px">TOTAL</td><td class="mono" style="color:#22c55e;font-weight:700">'+tE+'</td><td class="mono" style="color:#60a5fa;font-weight:700">'+tT+'</td><td class="mono" style="color:var(--gold);font-weight:700">'+tV+'</td><td class="mono" style="color:#f97316;font-weight:700">'+tP+'</td><td></td><td class="mono" style="color:'+(tL>0?'#22c55e':'var(--mu)')+';font-weight:700">'+(tL>0?fcur(tL):'-')+'</td></tr>';}
    ge('rep-c').innerHTML='<div style="display:flex;gap:9px;margin-bottom:16px"><select class="inp" id="rep-m" style="flex:1" onchange="App.renderRep(Number(this.value),Number(ge('rep-y').value))">'+mO+'</select><select class="inp" id="rep-y" style="width:95px" onchange="App.renderRep(Number(ge('rep-m').value),Number(this.value))">'+yO+'</select></div>'+
      '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px;margin-bottom:16px"><div class="sc"><div class="sv" style="color:#22c55e;font-size:28px">'+tE+'</div><div class="slb">Entradas</div></div><div class="sc"><div class="sv" style="color:#60a5fa;font-size:28px">'+tT+'</div><div class="slb">Transf.</div></div><div class="sc"><div class="sv" style="color:var(--gold);font-size:28px">'+tV+'</div><div class="slb">Vendas</div></div><div class="sc"><div class="sv" style="color:'+(tL>0?'#22c55e':'var(--mu)')+';font-size:22px">'+(tL>0?fcur(tL):'--')+'</div><div class="slb">Lucro Est.</div></div></div>'+
      '<div class="card" style="padding:0"><div class="ovx"><table class="tbl" style="min-width:480px"><thead><tr><th>Produto</th><th>Ent</th><th>Tra</th><th>Ven</th><th>Ava</th><th>Vec</th><th>Lucro</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'+
      '<div style="margin-top:14px"><button class="btn bsec" onclick="App.exportJSON()" style="font-size:12px">Backup JSON</button></div>';
  },

  renderPurchase:function(){
    var ps=this.prods,ms=this.movs,list=[],i,p,s,need;
    for(i=0;i<ps.length;i++){p=ps[i];s=cst(p.id,ms);if(s.total>=(p.estoque_minimo||0))continue;need=Math.max(0,(p.estoque_minimo||0)*2-s.total);list.push({p:p,s:s,need:need});}
    list.sort(function(a,b){return a.s.total-b.s.total;});
    var lH='';
    if(list.length===0){lH='<div class="empty">&#10004; Nenhuma compra necessaria!</div>';}
    else{lH='<div style="background:rgba(212,160,23,.07);border:1px solid rgba(212,160,23,.2);border-radius:10px;padding:10px 13px;margin-bottom:14px;font-size:12px;color:var(--gold)">Quantidade sugerida = 2x o minimo configurado.</div>';
    for(i=0;i<list.length;i++){var li=list[i];lH+='<div class="pitem"><div class="pitem-top"><div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(li.p.item)+'</div><div style="font-size:10px;color:var(--mu)">'+esc(li.p.marca)+' '+esc(li.p.gramatura)+'</div></div><div style="text-align:right">'+bdg(li.s.total,li.p.estoque_minimo)+'</div></div>'+pbr(li.s.total,li.p.estoque_minimo||0)+'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px"><div style="font-size:11px;color:var(--mu)">Atual: <span class="mono">'+li.s.total+'</span> · Min: <span class="mono">'+(li.p.estoque_minimo||0)+'</span></div><div style="font-family:Oswald,sans-serif;font-size:15px;font-weight:700;color:var(--gold)">Comprar: '+li.need+' un.</div></div></div>';}
    lH+='<div style="margin-top:14px"><button class="btn bprim" style="font-size:12px" onclick="App.copyList()">Copiar para WhatsApp</button></div>';}
    ge('pur-c').innerHTML='<div style="margin-bottom:14px"><div class="h2" style="color:var(--gold)">LISTA DE COMPRAS</div><div style="font-size:11px;color:var(--mu);margin-top:3px">'+list.length+' produto(s) para repor</div></div>'+lH;
  },
  copyList:function(){
    var ps=this.prods,ms=this.movs,txt='Lista de Compras - Kibaca Salgaderia
'+new Date().toLocaleDateString('pt-BR')+'

',i,p,s,need;
    for(i=0;i<ps.length;i++){p=ps[i];s=cst(p.id,ms);if(s.total>=(p.estoque_minimo||0))continue;need=Math.max(0,(p.estoque_minimo||0)*2-s.total);txt+='- '+p.item+' ('+p.gramatura+'): '+need+' un.
';}
    try{navigator.clipboard.writeText(txt).then(function(){App.toast('Lista copiada!');vib();});}catch(e){this.showAlert('Copie manualmente o texto acima.');}

  showShift:function(){
    var td=tday(),ms=[],i,m,tE=0,tT=0,tV=0,tP=0,tL=0,p;
    for(i=0;i<this.movs.length;i++){if(this.movs[i].data===td)ms.push(this.movs[i]);}
    var md=getMood(this.prods,this.movs);
    for(i=0;i<ms.length;i++){m=ms[i];var q=Number(m.quantidade);if(m.tipo==='Entrada')tE+=q;else if(m.tipo==='Transferencia')tT+=q;else if(m.tipo==='Venda'){tV+=q;for(var j=0;j<this.prods.length;j++){if(this.prods[j].id===m.product_id){p=this.prods[j];tL+=((p.preco_venda||0)-(p.custo_unitario||0))*q;break;}}}else tP+=q;}
    var al=0;for(i=0;i<this.prods.length;i++){var ss=cst(this.prods[i].id,this.movs);if(ss.total<(this.prods[i].estoque_minimo||0))al++;}
    ge('shift-mascot').innerHTML=msvg(md,62);
    ge('shift-date').textContent=new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    var rows=[['Entradas',tE,'#22c55e'],['Transferencias',tT,'#60a5fa'],['Vendas',tV,'#D4A017'],['Perdas',tP,'#ef4444']],h='';
    for(i=0;i<rows.length;i++)h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd)"><span>'+rows[i][0]+'</span><span class="mono" style="font-size:22px;color:'+rows[i][2]+'">'+rows[i][1]+'</span></div>';
    if(tL>0)h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd)"><span>Lucro estimado</span><span class="mono" style="font-size:20px;color:#22c55e">'+fcur(tL)+'</span></div>';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--bd)"><span>Alertas ativos</span><span class="mono" style="font-size:22px;color:'+(al>0?'#ef4444':'#22c55e')+'">'+al+'</span></div>';
    h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0"><span>Lancamentos hoje</span><span class="mono" style="font-size:22px;color:var(--tx)">'+ms.length+'</span></div>';
    ge('shift-body').innerHTML=h;ge('mo-shift').classList.add('open');
  },

  saveUser:function(){
    var self=this;if(this._sv)return;
    var un=ge('uf-u').value.trim(),pw=ge('uf-p').value;
    if(!un||!pw){this.showAlert('Usuario e senha sao obrigatorios.');return;}
    this._sv=true;setBtnLoad('uf-btn',true);
    DB.from('users').insert({username:un,password_hash:hashPw(pw),name:ge('uf-n').value.trim(),restaurant_id:this.rest.id,role:ge('uf-role').value}).then(function(r){
      if(r.error)throw r.error;self.toast('Usuario criado!');self._ldSet('users');
    }).catch(function(){self.showAlert('Nao foi possivel criar o usuario. O nome de usuario pode ja existir.');}).then(function(){self._sv=false;setBtnLoad('uf-btn',false,'Criar Usuario');});
  },

  exportJSON:function(){
    var data={exportDate:new Date().toISOString(),restaurant:this.rest,products:this.prods,movements:this.movs};
    var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='kibaca_backup_'+tday()+'.json';a.click();
    this.toast('Backup exportado!');
  },

  _bar:function(on){var b=ge('loading-bar');if(!b)return;if(on){b.style.display='block';b.style.opacity='1';b.style.width='0';setTimeout(function(){b.style.width='70%';},50);}else{b.style.width='100%';setTimeout(function(){b.style.opacity='0';setTimeout(function(){b.style.display='none';b.style.width='0';b.style.opacity='1';},300);},200);}},
  toast:function(msg,isErr){
